<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Main circle background -->
  <circle cx="96" cy="96" r="90" fill="#0052CC"/>
  
  <!-- Gear/Tools icon - center design -->
  <g transform="translate(96, 80)">
    <!-- Outer gear circle -->
    <circle cx="0" cy="0" r="50" fill="#0052CC" stroke="white" stroke-width="2"/>
    
    <!-- Gear teeth pattern (8 teeth) -->
    <g fill="white">
      <polygon points="0,-55 10,-52 12,-65 25,-58 18,-70 28,-65 32,-78 45,-65 35,-70 40,-85 28,-75 32,-90 20,-82 25,-98 12,-88 15,-105 0,-95 -15,-105 -12,-88 -25,-98 -20,-82 -32,-90 -28,-75 -40,-85 -35,-70 -45,-65 -32,-78 -28,-65 -18,-70 -25,-58 -12,-65 -10,-52"/>
    </g>
    
    <!-- Center plus/cross symbol -->
    <g fill="white">
      <rect x="-8" y="-20" width="16" height="40" rx="3"/>
      <rect x="-20" y="-8" width="40" height="16" rx="3"/>
    </g>
  </g>
  
  <!-- Bottom text area background -->
  <rect x="0" y="155" width="192" height="37" fill="#0052CC"/>
  
  <!-- Text: HASUNO WORKSHOP -->
  <text x="96" y="172" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1.5">
    HASUNO
  </text>
  <text x="96" y="182" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#B3D9FF" text-anchor="middle" letter-spacing="0.8">
    WORKSHOP
  </text>
</svg>